<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-card">
    <header>
      <h1>Smart Calculator</h1>
      <p class="subtitle">Quick math with history and reusable inputs</p>
      <span class="version">UI v2.0.0</span>
    </header>

    <section class="form-grid">
      <label for="num1">Number A</label>
      <input type="number" id="num1" placeholder="e.g. 42" step="any">

      <label for="num2">Number B</label>
      <input type="number" id="num2" placeholder="e.g. 5" step="any">

      <label for="operation">Operation</label>
      <select id="operation">
        <option value="add">Add (+)</option>
        <option value="sub">Subtract (-)</option>
        <option value="mul">Multiply (×)</option>
        <option value="div">Divide (÷)</option>
        <option value="percent">Percentage (% of)</option>
      </select>
    </section>

    <section class="actions">
      <button id="calculateBtn">Calculate</button>
      <button id="swapBtn" class="secondary">Swap Inputs</button>
      <button id="clearHistoryBtn" class="danger">Clear History</button>
    </section>

    <p id="result" aria-live="polite">Result: —</p>

    <section>
      <h2>Recent Calculations</h2>
      <ul id="historyList" class="history-list"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
